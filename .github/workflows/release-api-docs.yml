name: Release API Docs

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish docs under
        required: true

permissions:
  contents: read

concurrency:
  group: release-api-docs
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      REPOSITORY: ${{ github.repository }}
      PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve release tag
        run: |
          release_tag="${{ github.event.release.tag_name }}"
          if [ -z "${release_tag}" ]; then
            release_tag="${{ inputs.release_tag }}"
          fi
          if [ -z "${release_tag}" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi
          echo "RELEASE_TAG=${release_tag}" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate deploy token
        run: |
          if [ -z "${PAGES_DEPLOY_TOKEN}" ]; then
            echo "::error::Missing secret PAGES_DEPLOY_TOKEN. Use a personal access token because commits pushed with GITHUB_TOKEN do not trigger a GitHub Pages build."
            exit 1
          fi

      - name: Generate API docs
        run: chmod +x ./gradlew && ./gradlew generateApiDocs

      - name: Publish docs to gh-pages
        run: bash ./.github/scripts/publish-api-site.sh
